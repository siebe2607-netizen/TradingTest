data:
  default_ticker: "ADYEN.AS"
  default_period: "2y"
  default_interval: "1d"

strategy:
  name: "valuation_overlay"
  sma_short_period: 20
  sma_long_period: 50
  ema_period: 12
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bollinger_period: 20
  bollinger_std_dev: 2
  valuation_engine: "classic"  # Options: "classic", "growth", "revenue"
  forward_estimate_weight: 0.6  # Blend weight for analyst forward estimates (growth engine)

risk:
  initial_capital: 100000.0
  max_position_pct: 0.10
  stop_loss_pct: 0.05
  take_profit_pct: 0.15
  max_drawdown_pct: 0.20
  margin_of_safety: 0.15
  max_open_positions: 5

sensitivity:
  n_simulations: 1000
  seed: null  # Set for reproducible results

paper_trading:
  tickers: ["ADYEN.AS", "AAPL", "MSFT", "GOOGL", "AMZN", "TSLA"]
  check_interval_seconds: 60
  trading_hours_start: "09:30"
  trading_hours_end: "16:00"
  timezone: "US/Eastern"
